title: ilostmyipod
email:
description: >-
  Personal projects, writeups, experiments, and random things from the internet.

github_username: ilostmyipod
minimal_mistakes_skin: dark
search: true

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"

permalink: /:categories/:title/
paginate: 5
paginate_path: /page:num/
timezone: America/Denver

include:
  - _pages

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "ilostmyipod"
  avatar: "/assets/images/bio-image.png"
  bio: "Retro tech, jailbreaks, hardware mods, low-level experiments, and internet archaeology."

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/ilostmyipod"

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      share: true
      related: true

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/
